name: release-freebsd

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional tag to release (e.g. v0.11.2-freebsd.1)"
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GOOS: freebsd
      GOARCH: amd64
      CGO_ENABLED: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Detect embed requirement
        id: embed
        shell: bash
        run: |
          # 检测是否需要 web/dist（粗略但实用）
          if grep -R --line-number --include='*.go' -E '//go:embed|web/dist|embed\.FS|embed\.' . >/dev/null 2>&1; then
            echo "required=true" >> "$GITHUB_OUTPUT"
          else
            echo "required=false" >> "$GITHUB_OUTPUT"
          fi
          echo "embed required = $(sed -n 's/^required=//p' "$GITHUB_OUTPUT")"

      - name: Check frontend project
        id: frontend
        shell: bash
        run: |
          if [ -f web/package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
          echo "frontend exists = $(sed -n 's/^exists=//p' "$GITHUB_OUTPUT")"

      - name: Setup Node (if frontend exists and embed required)
        if: steps.frontend.outputs.exists == 'true' && steps.embed.outputs.required == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend (if needed)
        if: steps.frontend.outputs.exists == 'true' && steps.embed.outputs.required == 'true'
        shell: bash
        run: |
          set -e

          # 仓库里已有 web/dist 就跳过构建，避免不必要的 npm 依赖冲突
          if [ -d web/dist ] && [ "$(find web/dist -mindepth 1 -maxdepth 1 | wc -l)" -gt 0 ]; then
            echo "web/dist already exists, skip frontend build."
            exit 0
          fi

          # 兼容你当前依赖树冲突（React peer deps）
          if [ -f web/package-lock.json ]; then
            npm ci --prefix web --legacy-peer-deps
          else
            npm install --prefix web --legacy-peer-deps
          fi

          npm run build --prefix web

      - name: Ensure web/dist exists (if embed required)
        if: steps.embed.outputs.required == 'true'
        shell: bash
        run: |
          if [ ! -d web/dist ]; then
            echo "ERROR: embed required but web/dist not found."
            exit 1
          fi

      - name: Build binary
        shell: bash
        run: |
          set -e
          mkdir -p dist

          # 先尝试根目录，再尝试 cmd/new-api
          if go build -trimpath -ldflags "-s -w" -o dist/new-api .; then
            echo "Built from module root."
          else
            echo "Build from root failed, trying ./cmd/new-api ..."
            go build -trimpath -ldflags "-s -w" -o dist/new-api ./cmd/new-api
          fi

          ls -lah dist/new-api
          file dist/new-api || true

      - name: Pack tar.gz + sha256
        id: pack
        shell: bash
        run: |
          set -e
          PKG="new-api_freebsd_amd64"
          tar -C dist -czf "${PKG}.tar.gz" new-api
          sha256sum "${PKG}.tar.gz" > "${PKG}.tar.gz.sha256"
          ls -lah "${PKG}.tar.gz" "${PKG}.tar.gz.sha256"
          echo "pkg=${PKG}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: new-api_freebsd_amd64
          path: |
            new-api_freebsd_amd64.tar.gz
            new-api_freebsd_amd64.tar.gz.sha256

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ inputs.tag }}" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=" >> "$GITHUB_OUTPUT"
          fi
          echo "release tag = $(sed -n 's/^value=//p' "$GITHUB_OUTPUT")"

      - name: Create tag on manual run (if provided and missing)
        if: github.event_name == 'workflow_dispatch' && steps.tag.outputs.value != ''
        shell: bash
        run: |
          set -e
          TAG="${{ steps.tag.outputs.value }}"
          git fetch --tags
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "${TAG}" "${GITHUB_SHA}"
            git push origin "refs/tags/${TAG}"
            echo "Tag ${TAG} created and pushed."
          fi

      - name: Release on tag push
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          files: |
            new-api_freebsd_amd64.tar.gz
            new-api_freebsd_amd64.tar.gz.sha256
          generate_release_notes: true

      - name: Release on manual run with tag input
        if: github.event_name == 'workflow_dispatch' && steps.tag.outputs.value != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          files: |
            new-api_freebsd_amd64.tar.gz
            new-api_freebsd_amd64.tar.gz.sha256
          generate_release_notes: true
