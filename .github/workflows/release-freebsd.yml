name: Release new-api FreeBSD amd64

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "release tag, e.g. v1.0.0-freebsd.1 (optional)"
        required: false
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      CGO_ENABLED: 0
      GOOS: freebsd
      GOARCH: amd64
      BIN_NAME: new-api
      OUT_DIR: dist
      TAR_NAME: new-api_freebsd_amd64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # 检测是否有 go:embed web/dist...
      - name: Detect embed requirement
        id: embedcheck
        shell: bash
        run: |
          set -e
          if grep -R --line-number --include="*.go" 'go:embed[[:space:]].*web/dist' . >/dev/null 2>&1; then
            echo "need_web_dist=true" >> "$GITHUB_OUTPUT"
            echo "Detected go:embed web/dist requirement."
          else
            echo "need_web_dist=false" >> "$GITHUB_OUTPUT"
            echo "No go:embed web/dist requirement detected."
          fi

      # 如果需要 web/dist，检查是否有 web/package.json
      - name: Check frontend project
        id: webproj
        if: steps.embedcheck.outputs.need_web_dist == 'true'
        shell: bash
        run: |
          set -e
          if [ -f web/package.json ]; then
            echo "has_web_project=true" >> "$GITHUB_OUTPUT"
            echo "Found web/package.json"
          else
            echo "has_web_project=false" >> "$GITHUB_OUTPUT"
            echo "No web/package.json found"
          fi

      - name: Setup Node (if frontend exists)
        if: steps.embedcheck.outputs.need_web_dist == 'true' && steps.webproj.outputs.has_web_project == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend (if needed)
        if: steps.embedcheck.outputs.need_web_dist == 'true' && steps.webproj.outputs.has_web_project == 'true'
        shell: bash
        run: |
          set -e
          cd web
          npm ci
          npm run build
          cd ..
          test -f web/dist/index.html || (echo "web/dist/index.html missing after frontend build" && exit 1)

      # 若需要 web/dist 但不存在，则失败
      - name: Ensure web/dist exists (if embed required)
        if: steps.embedcheck.outputs.need_web_dist == 'true'
        shell: bash
        run: |
          set -e
          test -f web/dist/index.html || (echo "embed requires web/dist/index.html but file not found" && exit 1)

      - name: Build binary
        shell: bash
        run: |
          set -e
          mkdir -p "${OUT_DIR}"

          # 入口在仓库根目录 main.go 时用这个：
          go build -trimpath -ldflags "-s -w" -o "${OUT_DIR}/${BIN_NAME}" .

          # 如果你的入口是 cmd/server，请改成：
          # go build -trimpath -ldflags "-s -w" -o "${OUT_DIR}/${BIN_NAME}" ./cmd/server

      - name: Pack tar.gz + sha256
        shell: bash
        run: |
          set -e
          cd "${OUT_DIR}"
          tar -czf "${TAR_NAME}" "${BIN_NAME}"
          sha256sum "${TAR_NAME}" > "${TAR_NAME}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: new-api-freebsd-amd64
          path: |
            dist/new-api_freebsd_amd64.tar.gz
            dist/new-api_freebsd_amd64.tar.gz.sha256

      - name: Release on tag push
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          文件: |
            dist/new-api_freebsd_amd64.tar.gz
            dist/new-api_freebsd_amd64.tar.gz.sha256

      - name: Release on manual run with tag input
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: ${{ github.event.inputs.tag }}
          文件: |
            dist/new-api_freebsd_amd64.tar.gz
            dist/new-api_freebsd_amd64.tar.gz.sha256
